<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#FAF9F7">
<title>Stair Session</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:        #FAF9F7;
  --bg-teal:   #EAF7F1;
  --bg-coral:  #FAF0EA;
  --teal:      #1A9970;
  --teal-bar:  #8ED5B8;
  --coral:     #D05530;
  --coral-bar: #EE9070;
  --text:      #2A2826;
  --muted:     #8A8880;
  --faint:     #C8C5C0;
  --border:    rgba(42,40,38,0.1);
  --nav-h:     68px;
  --ff:        'Figtree', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; min-height: 100dvh; overflow: hidden; }
body {
  font-family: var(--ff);
  background: var(--bg);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  -webkit-tap-highlight-color: transparent;
  user-select: none;
}

/* ── SCREENS ── */
.screen {
  position: fixed;
  inset: 0 0 var(--nav-h) 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 28px 20px 24px;
  display: none;
}
.screen.active { display: block; }
#session-screen {
  padding: 0;
  display: none;
  flex-direction: column;
  transition: background-color 0.7s ease;
}
#session-screen.active { display: flex; }

/* ── NAV ── */
#nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  height: var(--nav-h);
  background: var(--bg);
  border-top: 1px solid var(--border);
  display: flex;
  z-index: 100;
}
.nav-btn {
  flex: 1; height: 100%;
  background: none; border: none; cursor: pointer;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 3px;
  color: var(--faint);
  font-family: var(--ff); font-size: 10px; font-weight: 500;
  letter-spacing: 0.04em;
  transition: color 0.2s;
  position: relative;
}
.nav-btn.active { color: var(--text); }
.s-dot {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--coral);
  position: absolute; top: 10px; right: calc(50% - 14px);
  display: none;
}
.s-dot.show { display: block; }

/* ── SHARED ── */
.sec-lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 10px;
}
.primary-btn {
  width: 100%; padding: 16px;
  border-radius: 12px; border: none;
  background: var(--text); color: var(--bg);
  font-family: var(--ff); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
.primary-btn:active { opacity: 0.82; }
.primary-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

/* ── SETUP ── */
.last-card {
  border: 1px solid var(--border); border-radius: 14px;
  padding: 16px; margin-bottom: 28px;
}
.card-lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase;
  color: var(--faint); margin-bottom: 12px;
}
.last-stats { display: flex; gap: 28px; }
.ls-val { font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; }
.ls-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }

.check-item {
  display: flex; align-items: center; gap: 14px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  cursor: pointer;
}
.check-item:first-child { border-top: 1px solid var(--border); }
.chk {
  width: 22px; height: 22px; border-radius: 6px;
  border: 1.5px solid var(--faint); flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
}
.chk svg { display: none; }
.check-item.on .chk { background: var(--teal); border-color: var(--teal); }
.check-item.on .chk svg { display: block; }
.check-item.on .chk-txt { color: var(--muted); }
.chk-txt { font-size: 14px; line-height: 1.4; }

#connect-wrap { margin-top: 28px; display: none; }
.bt-row {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 16px;
  border: 1px solid var(--border); border-radius: 12px;
  margin-bottom: 12px;
}
.bt-led {
  width: 8px; height: 8px; border-radius: 50%;
  background: var(--faint); flex-shrink: 0;
  transition: background 0.4s;
}
.bt-led.on { background: var(--teal); }
.bt-lbl { font-size: 14px; color: var(--muted); }
#live-hr {
  font-size: 14px; font-weight: 600;
  margin-left: auto; font-variant-numeric: tabular-nums; display: none;
}
#bt-note { font-size: 12px; color: var(--muted); margin-top: 10px; line-height: 1.5; display: none; }

/* ── SESSION: POPUP ── */
#popup {
  position: absolute; top: 16px; left: 16px; right: 16px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 14px; padding: 16px 18px 14px;
  z-index: 20; opacity: 0; transform: translateY(-6px);
  transition: opacity 0.3s, transform 0.3s;
  pointer-events: none;
}
#popup.show { opacity: 1; transform: none; pointer-events: auto; cursor: pointer; }
#popup-name { font-size: 18px; font-weight: 600; margin-bottom: 3px; }
#popup-lvl { font-size: 14px; color: var(--muted); margin-bottom: 12px; }
#popup-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
#popup-fill { height: 100%; background: var(--muted); border-radius: 2px; width: 100%; }

#paused-ov {
  position: absolute; inset: 0;
  align-items: center; justify-content: center;
  flex-direction: column; gap: 10px;
  background: rgba(250,249,247,0.92);
  z-index: 15; display: none;
  cursor: pointer;
}
#paused-ov.show { display: flex; }
#paused-ov .p-label { font-size: 28px; font-weight: 500; }
#paused-ov .p-sub { font-size: 14px; color: var(--muted); margin-bottom: 8px; }
#btn-resume-ov {
  padding: 14px 36px;
  border-radius: 12px; border: none;
  background: var(--text); color: var(--bg);
  font-family: var(--ff); font-size: 15px; font-weight: 500;
  cursor: pointer;
}

/* ── SESSION: IDLE ── */
#s-idle {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 6px; padding: 40px; text-align: center;
}
#s-idle h2 { font-size: 22px; font-weight: 500; }
#s-idle p { font-size: 14px; color: var(--muted); margin-bottom: 24px; }
#s-idle .primary-btn { width: auto; padding: 15px 44px; }

/* ── SESSION: ACTIVE ── */
#s-active {
  flex: 1; flex-direction: column;
  padding: 32px 24px 16px; display: none;
}
#s-active.show { display: flex; }
#s-phase {
  font-size: 11px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
}
#s-time { font-size: 16px; font-weight: 500; color: var(--muted); margin-top: 2px; }
#s-signal { font-size: 12px; color: var(--coral); margin-top: 4px; display: none; }

.hr-block {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
.hr-row { display: flex; align-items: center; gap: 16px; }
#s-hr {
  font-size: 100px; font-weight: 600; line-height: 1;
  font-variant-numeric: tabular-nums; letter-spacing: -3px;
}
#s-arrow {
  font-size: 80px; color: var(--faint);
  line-height: 1; transition: color 0.3s;
}
#s-arrow.up  { color: var(--coral); }
#s-arrow.ok  { color: var(--teal); }
#s-arrow.dn  { color: var(--muted); }
#s-zone { font-size: 14px; color: var(--muted); }
#s-cue {
  font-size: 15px; font-weight: 500; color: var(--text);
  text-align: center; padding: 12px 18px;
  border: 1px solid var(--border); border-radius: 10px;
  background: rgba(255,255,255,0.5);
  opacity: 0; transition: opacity 0.6s;
}
#s-cue.show { opacity: 1; }

#s-controls { display: flex; gap: 10px; margin-top: 16px; }
#btn-pr {
  flex: 1; padding: 14px; border-radius: 12px;
  border: 1px solid var(--border); background: rgba(255,255,255,0.6);
  color: var(--text); font-family: var(--ff); font-size: 15px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
#btn-pr:active { opacity: 0.7; }
#btn-end {
  padding: 14px 18px; border-radius: 12px;
  border: 1px solid var(--border); background: none;
  color: var(--muted); font-family: var(--ff); font-size: 14px; cursor: pointer;
}

/* ── SESSION: PROGRESS BAR ── */
#prog-wrap {
  margin-top: 14px; height: 20px;
  position: relative; display: flex; align-items: center;
}
#prog-segs { display: flex; width: 100%; height: 6px; gap: 2px; }
.seg { height: 100%; border-radius: 1px; opacity: 0.38; transition: opacity 0.4s; }
.seg.cur  { opacity: 1; }
.seg.done { opacity: 0.62; }
#prog-dot {
  position: absolute; width: 10px; height: 10px; border-radius: 50%;
  background: var(--text); top: 50%; transform: translate(-50%,-50%);
  transition: left 0.5s linear; z-index: 2;
}

/* ── RECAP ── */
.recap-hdr { margin-bottom: 24px; }
.recap-title { font-size: 22px; font-weight: 500; margin-bottom: 4px; }
.recap-date { font-size: 13px; color: var(--muted); }
.recap-pills { display: flex; gap: 10px; margin-bottom: 24px; }
.recap-pill {
  flex: 1; border: 1px solid var(--border);
  border-radius: 12px; padding: 14px;
}
.pill-val { font-size: 24px; font-weight: 600; font-variant-numeric: tabular-nums; }
.pill-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
.int-bars { margin-bottom: 24px; }
.int-row  { margin-bottom: 12px; }
.int-head {
  display: flex; justify-content: space-between;
  font-size: 12px; color: var(--muted); margin-bottom: 5px;
}
.int-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
.int-fill  { height: 100%; border-radius: 3px; background: var(--coral-bar); transition: width 0.7s ease; }
.suggestion {
  padding: 16px; border: 1px solid var(--border);
  border-radius: 12px; margin-bottom: 24px;
}
.suggestion.good {
  border-color: rgba(26,153,112,0.25);
  background: rgba(26,153,112,0.04);
}
.sug-lbl {
  font-size: 10px; font-weight: 600;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px;
}
.suggestion.good .sug-lbl { color: var(--teal); }
.suggestion:not(.good) .sug-lbl { color: var(--muted); }
.sug-txt { font-size: 14px; line-height: 1.6; }
.hist-section { margin-bottom: 24px; }
.hist-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 11px 0; border-bottom: 1px solid var(--border); font-size: 13px;
}
.hist-item:first-child { border-top: 1px solid var(--border); }
.hist-d { color: var(--muted); }
.hist-v { color: var(--text); font-weight: 500; }
.data-row { display: flex; gap: 10px; margin-top: 4px; }
.sec-btn {
  flex: 1; padding: 13px; border-radius: 12px;
  border: 1px solid var(--border); background: none;
  color: var(--text); font-family: var(--ff); font-size: 14px; font-weight: 500;
  cursor: pointer; transition: opacity 0.15s;
}
.sec-btn:active { opacity: 0.7; }
</style>
</head>
<body>

<!-- ═══════════════ SETUP SCREEN ═══════════════ -->
<div id="setup-screen" class="screen active">
  <div id="last-card" class="last-card"></div>
  <p class="sec-lbl">Before you start</p>
  <div id="checklist"></div>
  <div id="connect-wrap">
    <p class="sec-lbl" style="margin-top:28px">Heart rate monitor</p>
    <div class="bt-row">
      <div class="bt-led" id="bt-led"></div>
      <span class="bt-lbl" id="bt-lbl">Not connected</span>
      <span id="live-hr"></span>
    </div>
    <button class="primary-btn" id="btn-connect">Connect H10</button>
    <p id="bt-note"></p>
  </div>
</div>

<!-- ═══════════════ SESSION SCREEN ═══════════════ -->
<div id="session-screen" class="screen">

  <!-- Phase popup -->
  <div id="popup">
    <div id="popup-name"></div>
    <div id="popup-lvl"></div>
    <div id="popup-track"><div id="popup-fill"></div></div>
  </div>

  <!-- Paused overlay — tap anywhere to resume -->
  <div id="paused-ov" onclick="resumeSession()">
    <span class="p-label">Paused</span>
    <span class="p-sub">HR monitor still reading</span>
    <button id="btn-resume-ov">Resume session</button>
  </div>

  <!-- Idle state -->
  <div id="s-idle">
    <h2>Ready?</h2>
    <p>30 minutes · 3 intervals</p>
    <button class="primary-btn" id="btn-start" disabled>Connect H10 first</button>
  </div>

  <!-- Active state -->
  <div id="s-active">
    <div>
      <div id="s-phase">WARM-UP</div>
      <div id="s-time">5:00 remaining</div>
      <div id="s-signal">HR signal lost — timer only</div>
    </div>
    <div class="hr-block">
      <div class="hr-row">
        <div id="s-hr">—</div>
        <div id="s-arrow"></div>
      </div>
      <div id="s-zone"></div>
      <div id="s-cue"></div>
    </div>
    <div id="s-controls">
      <button id="btn-pr">Pause</button>
      <button id="btn-end">End</button>
    </div>
    <div id="prog-wrap">
      <div id="prog-segs"></div>
      <div id="prog-dot" style="left:0%"></div>
    </div>
  </div>

</div>

<!-- ═══════════════ RECAP SCREEN ═══════════════ -->
<div id="recap-screen" class="screen">
  <div id="recap-content"></div>
  <div class="data-row">
    <button class="sec-btn" id="btn-export">Export data</button>
    <button class="sec-btn" id="btn-import">Import data</button>
    <input type="file" id="file-input" accept=".json" style="display:none">
  </div>
</div>

<!-- ═══════════════ BOTTOM NAV ═══════════════ -->
<nav id="nav">
  <button class="nav-btn active" data-s="setup">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <rect x="3" y="2" width="16" height="18" rx="2"/>
      <line x1="7" y1="8"  x2="15" y2="8"/>
      <line x1="7" y1="12" x2="15" y2="12"/>
      <line x1="7" y1="16" x2="11" y2="16"/>
    </svg>
    Setup
  </button>
  <button class="nav-btn" data-s="session">
    <div class="s-dot" id="s-dot"></div>
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M11 19C11 19 3 13.5 3 7.5C3 5 5 3 7.5 3C9.2 3 10.5 4 11 5.5C11.5 4 12.8 3 14.5 3C17 3 19 5 19 7.5C19 13.5 11 19 11 19Z"/>
    </svg>
    Session
  </button>
  <button class="nav-btn" data-s="recap">
    <svg width="22" height="22" viewBox="0 0 22 22" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
      <rect x="3"  y="12" width="4" height="7" rx="1"/>
      <rect x="9"  y="7"  width="4" height="12" rx="1"/>
      <rect x="15" y="3"  width="4" height="16" rx="1"/>
    </svg>
    Recap
  </button>
</nav>

<script>
// ═══════ CONFIG ═══════
const PHASES = [
  { name:'Warm-up',    dur:300, type:'rest', level:'4–5',   lo:109, hi:127, cue:null },
  { name:'Interval 1', dur:240, type:'work', level:'11–13', lo:154, hi:172, cue:'Full foot — push the step down' },
  { name:'Recovery',   dur:180, type:'rest', level:'4–5',   lo:109, hi:127, cue:null },
  { name:'Interval 2', dur:240, type:'work', level:'11–13', lo:154, hi:172, cue:'Lift your chest' },
  { name:'Recovery',   dur:180, type:'rest', level:'4–5',   lo:109, hi:127, cue:null },
  { name:'Interval 3', dur:240, type:'work', level:'11–13', lo:154, hi:172, cue:'Fingertips only' },
  { name:'Cool-down',  dur:420, type:'rest', level:'3–4',   lo:60,  hi:127, cue:null },
];
const TOTAL = PHASES.reduce((s,p) => s + p.dur, 0); // 1800s

const CHECKS = [
  'Eyes on a fixed point ahead',
  'Chest lifted, not hunched',
  'Fingertips only on rails',
  'Whole foot on step — feel the heel',
  'Slight bend in both knees',
];

// ═══════ STATE ═══════
const state = {
  screen: 'setup',
  checks: new Array(CHECKS.length).fill(false),
  bt: { connected: false, device: null, char: null, hr: 0 },
  sess: null,
  history: [],
  lastResult: null,
  levels: { interval: [11, 11, 11], recovery: 5 },
};

// ═══════ STORAGE ═══════
function loadHistory() {
  try { state.history = JSON.parse(localStorage.getItem('ss-hist') || '[]'); }
  catch(e) { state.history = []; }
}
function saveHistory() {
  localStorage.setItem('ss-hist', JSON.stringify(state.history));
}

// ═══════ ADAPTIVE LEVELS ═══════
// Defaults: interval level 11, recovery level 5
function loadLevels() {
  try {
    const saved = JSON.parse(localStorage.getItem('ss-levels'));
    if (saved && saved.interval && saved.recovery !== undefined) {
      state.levels = saved;
    } else {
      state.levels = { interval: [11, 11, 11], recovery: 5 };
    }
  } catch(e) {
    state.levels = { interval: [11, 11, 11], recovery: 5 };
  }
}
function saveLevels() {
  localStorage.setItem('ss-levels', JSON.stringify(state.levels));
}

function computeNextLevels(result) {
  const { intervalZone, aboveZone, recoveryHigh } = result;
  const lvl = [...state.levels.interval];

  for (let i = 0; i < 3; i++) {
    const above = aboveZone?.[i] ?? 0;
    const inZ   = intervalZone[i];
    if (above > 0.2) {
      // Spent more than 20% of interval above ceiling — too hard
      lvl[i] = Math.max(7, lvl[i] - 1);
    } else if (inZ < 0.4) {
      // Barely reached zone — too easy
      lvl[i] = Math.min(20, lvl[i] + 1);
    } else if (inZ >= 0.8 && above < 0.05) {
      // Nailing it cleanly — ready to push up
      lvl[i] = Math.min(20, lvl[i] + 1);
    }
    // Between 0.4–0.8 in zone with manageable overshoot → keep same level
  }
  state.levels.interval = lvl;

  // Recovery: if either recovery phase had HR > 140 for > 40% of the time,
  // suggest slightly higher active recovery level to aid lactate clearance
  const highRecovery = (recoveryHigh ?? []).some(v => v > 0.4);
  state.levels.recovery = highRecovery ? 6 : 5;
}

// ═══════ NAVIGATION ═══════
function goTo(screen) {
  if (state.screen === 'session' && screen !== 'session') {
    if (state.sess?.running && !state.sess.paused) pauseSession();
  }
  state.screen = screen;
  document.querySelectorAll('.screen').forEach(el =>
    el.classList.toggle('active', el.id === screen + '-screen'));
  document.querySelectorAll('.nav-btn').forEach(btn =>
    btn.classList.toggle('active', btn.dataset.s === screen));
  if (screen === 'setup')   renderSetup();
  if (screen === 'session') updateIdleState();
  if (screen === 'recap')   renderRecap();
}

// ═══════ SETUP SCREEN ═══════
function renderSetup() {
  renderLastCard();
  renderChecklist();
  updateConnectVisibility();
}

function renderLastCard() {
  const el   = document.getElementById('last-card');
  const real = realSessions(state.history);
  const last = real[real.length - 1];
  if (!last) {
    el.innerHTML = `<div class="card-lbl">Last session</div>
      <div style="font-size:14px;color:var(--muted)">No sessions yet — ready to start?</div>`;
    return;
  }
  const d = new Date(last.date);
  const ds = d.toLocaleDateString('en-GB', {weekday:'short', day:'numeric', month:'short'});
  const avgZ = Math.round(last.intervalZone.reduce((a,b) => a+b, 0) / 3 * 100);
  el.innerHTML = `<div class="card-lbl">Last session</div>
    <div class="last-stats">
      <div><div class="ls-val" style="color:var(--coral)">${last.peakHR}</div><div class="ls-sub">Peak HR</div></div>
      <div><div class="ls-val">${avgZ}%</div><div class="ls-sub">Avg in zone</div></div>
      <div><div class="ls-val" style="font-size:14px;padding-top:5px">${ds}</div><div class="ls-sub">Date</div></div>
    </div>`;
}

function renderChecklist() {
  document.getElementById('checklist').innerHTML = CHECKS.map((txt, i) => `
    <div class="check-item${state.checks[i] ? ' on' : ''}" data-i="${i}">
      <div class="chk">
        <svg width="12" height="9" viewBox="0 0 12 9" fill="none">
          <polyline points="1,5 4,8 11,1" stroke="white" stroke-width="1.8"
            stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <span class="chk-txt">${txt}</span>
    </div>`).join('');
}

function updateConnectVisibility() {
  const allDone = state.checks.every(Boolean);
  document.getElementById('connect-wrap').style.display = allDone ? 'block' : 'none';
}

// Checklist delegation
document.getElementById('checklist').addEventListener('click', e => {
  const item = e.target.closest('.check-item');
  if (!item) return;
  const i = parseInt(item.dataset.i);
  state.checks[i] = !state.checks[i];
  item.classList.toggle('on', state.checks[i]);
  updateConnectVisibility();
});

function updateBTStatus() {
  const { connected, hr } = state.bt;
  document.getElementById('bt-led').classList.toggle('on', connected);
  document.getElementById('bt-lbl').textContent = connected ? 'H10 connected' : 'Not connected';
  const liveEl = document.getElementById('live-hr');
  liveEl.style.display = connected ? 'block' : 'none';
  if (connected && hr > 0) liveEl.textContent = hr + ' bpm';
}

// ═══════ BLUETOOTH ═══════
async function connectBT() {
  if (!navigator.bluetooth) {
    const n = document.getElementById('bt-note');
    n.style.display = 'block';
    n.textContent = 'Web Bluetooth is not supported here. Please open in Chrome on your Pixel 6.';
    return;
  }
  const btn = document.getElementById('btn-connect');
  btn.disabled = true;
  btn.textContent = 'Connecting…';
  try {
    const device = await navigator.bluetooth.requestDevice({
      filters: [{ services: ['heart_rate'] }],
    });
    const server = await device.gatt.connect();
    const svc    = await server.getPrimaryService('heart_rate');
    const char   = await svc.getCharacteristic('heart_rate_measurement');
    await char.startNotifications();
    char.addEventListener('characteristicvaluechanged', onHRData);
    device.addEventListener('gattserverdisconnected', onBTDisconnect);
    state.bt = { connected: true, device, char, hr: 0 };
    btn.textContent = 'Connected ✓';
    updateBTStatus();
    updateIdleState();
  } catch(e) {
    btn.disabled = false;
    btn.textContent = 'Connect H10';
    if (e.name !== 'NotFoundError') {
      const n = document.getElementById('bt-note');
      n.style.display = 'block';
      n.textContent = 'Connection failed: ' + (e.message || e.name) +
        '. Make sure the strap is damp and worn, and Polar Flow is closed.';
    }
  }
}

function onHRData(e) {
  const v = e.target.value;
  const flags = v.getUint8(0);
  state.bt.hr = (flags & 0x01) ? v.getUint16(1, true) : v.getUint8(1);
  if (state.screen === 'setup') updateBTStatus();
  if (state.screen === 'session' && state.sess?.running && !state.sess.paused) updateSessionUI();
}

function onBTDisconnect() {
  state.bt.connected = false;
  state.bt.hr = 0;
  updateBTStatus();
  const sig = document.getElementById('s-signal');
  if (sig) sig.style.display = 'block';

  // Attempt auto-reconnect, re-subscribing to notifications each time
  async function tryReconnect() {
    try {
      if (!state.bt.device) return;
      const server = await state.bt.device.gatt.connect();
      const svc    = await server.getPrimaryService('heart_rate');
      const char   = await svc.getCharacteristic('heart_rate_measurement');
      await char.startNotifications();
      char.addEventListener('characteristicvaluechanged', onHRData);
      state.bt.connected = true;
      state.bt.char = char;
      if (sig) sig.style.display = 'none';
      updateBTStatus();
    } catch(e) {
      // Retry after 3s if still in a session
      if (state.sess?.running) setTimeout(tryReconnect, 3000);
    }
  }
  setTimeout(tryReconnect, 3000);
}

// ═══════ SPEECH ═══════
function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.rate = 0.92; u.volume = 0.85;
  window.speechSynthesis.speak(u);
}

// ═══════ SESSION ═══════
let ticker = null;

function updateIdleState() {
  const btn = document.getElementById('btn-start');
  if (!btn) return;
  if (state.sess?.running) {
    btn.textContent = 'Session in progress';
    btn.disabled = true;
  } else if (!state.bt.connected) {
    btn.textContent = 'Connect H10 first';
    btn.disabled = true;
  } else {
    btn.textContent = 'Start session';
    btn.disabled = false;
  }
}

function startSession() {
  if (!state.bt.connected) return;
  state.sess = {
    running: true, paused: false,
    pi: 0, pe: 0, te: 0,
    inZone:      new Array(PHASES.length).fill(0),
    aboveZone:   new Array(PHASES.length).fill(0),
    recoveryHigh: new Array(PHASES.length).fill(0), // time HR>140 during rest phases
    peak: 0,
    cueSaid: false, countdown: null,
    lastTick: Date.now(),
  };
  document.getElementById('s-idle').style.display = 'none';
  document.getElementById('s-active').classList.add('show');
  document.getElementById('s-dot').classList.add('show');
  document.getElementById('paused-ov').classList.remove('show');
  document.getElementById('s-signal').style.display = 'none';
  buildProgressBar();
  updateSessionBg();
  showPopup(PHASES[0]);
  speak('Session starting. Warm up. Level 4 to 5.');
  ticker = setInterval(tick, 250);
  updateSessionUI();
}

function tick() {
  if (!state.sess?.running || state.sess.paused) return;
  const now = Date.now();
  const dt  = Math.min((now - state.sess.lastTick) / 1000, 1.5);
  state.sess.lastTick = now;
  state.sess.pe += dt;
  state.sess.te += dt;

  const phase = PHASES[state.sess.pi];
  const hr    = state.bt.hr;

  if (hr > 0) {
    if (hr >= phase.lo && hr <= phase.hi) state.sess.inZone[state.sess.pi] += dt;
    if (hr > phase.hi)                    state.sess.aboveZone[state.sess.pi] += dt;
    if (phase.type === 'rest' && hr > 140) state.sess.recoveryHigh[state.sess.pi] += dt;
    if (hr > state.sess.peak)             state.sess.peak = hr;
  }

  // Show cue 30s into each interval
  if (phase.type === 'work' && !state.sess.cueSaid && state.sess.pe >= 30) {
    state.sess.cueSaid = true;
    showCue(phase.cue);
    speak(phase.cue);
  }

  // Countdown last 5 seconds
  const rem = phase.dur - state.sess.pe;
  if (rem <= 5 && rem > 0) {
    const sec = Math.ceil(rem);
    if (sec !== state.sess.countdown) {
      state.sess.countdown = sec;
      speak(String(sec));
    }
  }

  if (state.sess.pe >= phase.dur) { nextPhase(); return; }
  updateSessionUI();
}

function nextPhase() {
  state.sess.pi++;
  if (state.sess.pi >= PHASES.length) { endSession(); return; }
  state.sess.pe = 0; state.sess.cueSaid = false; state.sess.countdown = null;
  hideCue();
  updateSessionBg();
  const p = PHASES[state.sess.pi];
  showPopup(p);
  speak(`${p.name}. Level ${p.level}.`);
  updateSessionUI();
}

function pauseSession() {
  if (!state.sess) return;
  state.sess.paused = true;
  document.getElementById('paused-ov').classList.add('show');
}

function resumeSession() {
  if (!state.sess) return;
  state.sess.paused = false;
  state.sess.lastTick = Date.now();
  document.getElementById('paused-ov').classList.remove('show');
}

function endSession() {
  clearInterval(ticker); ticker = null;
  if (!state.sess) return;
  state.sess.running = false;

  // Interval indices in PHASES: 1, 3, 5
  const intervalZone  = [1,3,5].map(i =>
    PHASES[i].dur > 0 ? state.sess.inZone[i]    / PHASES[i].dur : 0);
  const aboveZone     = [1,3,5].map(i =>
    PHASES[i].dur > 0 ? state.sess.aboveZone[i] / PHASES[i].dur : 0);
  // Recovery indices: 2, 4
  const recoveryHigh  = [2,4].map(i =>
    PHASES[i].dur > 0 ? state.sess.recoveryHigh[i] / PHASES[i].dur : 0);

  const result = {
    id: Date.now(),
    date: new Date().toISOString(),
    peakHR: state.sess.peak,
    intervalZone,
    aboveZone,
    recoveryHigh,
    levelsUsed: [...state.levels.interval],
    recoveryUsed: state.levels.recovery,
    duration: Math.round(state.sess.te),
  };
  state.history.push(result);
  state.lastResult = result;
  saveHistory();

  // Adapt levels for next session
  computeNextLevels(result);
  saveLevels();

  document.getElementById('s-dot').classList.remove('show');
  speak('Session complete. Well done.');

  setTimeout(() => {
    document.getElementById('s-active').classList.remove('show');
    document.getElementById('s-idle').style.display = 'flex';
    document.getElementById('paused-ov').classList.remove('show');
    document.getElementById('popup').classList.remove('show');
    document.getElementById('session-screen').style.backgroundColor = '';
    hideCue();
    state.sess = null;
    goTo('recap');
  }, 2000);
}

// ═══════ SESSION UI ═══════
function updateSessionBg() {
  const p = PHASES[state.sess.pi];
  document.getElementById('session-screen').style.backgroundColor =
    p.type === 'work' ? 'var(--bg-coral)' : 'var(--bg-teal)';
}

let popupTimer = null;
function showPopup(phase) {
  if (popupTimer) clearTimeout(popupTimer);
  const popup = document.getElementById('popup');
  document.getElementById('popup-name').textContent = phase.name;

  // Use personalised level if available, otherwise fall back to default range
  let lvlText = `Level ${phase.level}`;
  if (phase.type === 'work') {
    const iIdx = [1,3,5].indexOf(state.sess.pi);
    if (iIdx >= 0) lvlText = `Level ${state.levels.interval[iIdx]} · personalised`;
  } else if (phase.name.startsWith('Recovery')) {
    lvlText = `Level ${state.levels.recovery} · personalised`;
  }
  document.getElementById('popup-lvl').textContent = lvlText;
  const fill = document.getElementById('popup-fill');
  fill.style.transition = 'none';
  fill.style.width = '100%';
  popup.classList.add('show');
  requestAnimationFrame(() => requestAnimationFrame(() => {
    fill.style.transition = 'width 5s linear';
    fill.style.width = '0%';
  }));
  popupTimer = setTimeout(() => popup.classList.remove('show'), 5200);
  popup.onclick = () => { clearTimeout(popupTimer); popup.classList.remove('show'); };
}

function showCue(text) {
  const el = document.getElementById('s-cue');
  el.textContent = text; el.classList.add('show');
}
function hideCue() {
  document.getElementById('s-cue').classList.remove('show');
}

function updateSessionUI() {
  if (!state.sess?.running) return;
  const phase = PHASES[state.sess.pi];
  const hr    = state.bt.hr;
  const rem   = Math.max(0, phase.dur - state.sess.pe);
  const m = Math.floor(rem / 60);
  const s = Math.floor(rem % 60);

  document.getElementById('s-phase').textContent = phase.name.toUpperCase();
  document.getElementById('s-time').textContent  = `${m}:${s.toString().padStart(2,'0')} remaining`;
  document.getElementById('s-hr').textContent    = hr > 0 ? hr : '—';

  const arrow = document.getElementById('s-arrow');
  if (!hr || phase.type !== 'work') {
    arrow.textContent = ''; arrow.className = '';
  } else if (hr < phase.lo) {
    arrow.textContent = '↑'; arrow.className = 'up';
  } else if (hr > phase.hi) {
    arrow.textContent = '↓'; arrow.className = 'dn';
  } else {
    arrow.textContent = '→'; arrow.className = 'ok';
  }

  document.getElementById('s-zone').textContent =
    !hr                      ? '' :
    phase.type !== 'work'    ? '' :
    hr < phase.lo            ? 'Push a little harder' :
    hr > phase.hi            ? 'Ease off slightly' :
                               'In target zone';

  // Progress
  const pct = Math.min(state.sess.te / TOTAL, 1) * 100;
  document.getElementById('prog-dot').style.left = pct + '%';
  PHASES.forEach((_, i) => {
    const seg = document.getElementById('seg-' + i);
    if (!seg) return;
    seg.className = 'seg' +
      (i < state.sess.pi ? ' done' : i === state.sess.pi ? ' cur' : '');
  });
}

function buildProgressBar() {
  const wrap = document.getElementById('prog-segs');
  wrap.innerHTML = '';
  PHASES.forEach((p, i) => {
    const seg = document.createElement('div');
    seg.className = 'seg';
    seg.id = 'seg-' + i;
    seg.style.width = (p.dur / TOTAL * 100) + '%';
    seg.style.background = p.type === 'work' ? 'var(--coral-bar)' : 'var(--teal-bar)';
    seg.style.borderRadius =
      i === 0 ? '3px 1px 1px 3px' :
      i === PHASES.length - 1 ? '1px 3px 3px 1px' : '1px';
    wrap.appendChild(seg);
  });
}

// ═══════ RECAP ═══════
const MIN_REAL_SESSION = 300; // 5 minutes — anything shorter is a test run

function realSessions(history) {
  return history.filter(s => s.duration >= MIN_REAL_SESSION);
}

function getSuggestion(result, history) {
  const z     = result.intervalZone;
  const above = result.aboveZone ?? [0,0,0];
  const real  = realSessions(history);

  // Priority 1: Significant time above ceiling — overshooting
  if (above.some(v => v > 0.2)) {
    const i = above.findIndex(v => v > 0.2) + 1;
    return { good: false, text:
      `Interval ${i} pushed above the target zone for too long — your level was slightly high. The app has already adjusted your level down by 1 for next session.` };
  }

  // Priority 2: Any interval below 40% in zone — not reaching target
  if (z.some(v => v < 0.4)) {
    return { good: false, text:
      'Your HR stayed below the target zone during at least one interval. The app has nudged your level up for next session to help you reach zone sooner.' };
  }

  // Priority 3: Interval 1 between 40–65% — reaching zone but slowly
  if (z[0] < 0.65) {
    return { good: false, text:
      'Interval 1 reached the target zone but took a while to get there. Try increasing your level right from the start of the interval rather than building up gradually.' };
  }

  // Priority 4: Recovery HR stayed high
  if ((result.recoveryHigh ?? []).some(v => v > 0.4)) {
    return { good: false, text:
      'Your HR stayed high during recovery — the app has adjusted your recovery level up slightly. Active movement helps clear lactate faster than slowing to a near standstill.' };
  }

  // Priority 5: Third interval dropped significantly vs first
  if (z[2] < z[0] - 0.2) {
    return { good: false, text:
      'Your third interval was harder to sustain than the first. Try adding 30 extra seconds of recovery before it next session.' };
  }

  // Priority 6: Positive trend across real sessions
  if (z.every(v => v >= 0.8) && real.length >= 4) {
    const avg = s => s.intervalZone.reduce((a,b) => a+b, 0) / 3;
    const oldest = real[Math.max(0, real.length - 4)];
    const newest = real[real.length - 1];
    if (avg(newest) > avg(oldest) + 0.08) {
      return { good: true, text:
        `Your time in the target zone has improved across your last ${Math.min(real.length, 4)} sessions. Your cardiovascular fitness is building — this is exactly what the protocol is designed to produce.` };
    }
  }

  return null;
}

function renderRecap() {
  const real   = realSessions(state.history);
  const result = state.lastResult ||
    (real.length ? real[real.length - 1] : null);
  const el = document.getElementById('recap-content');

  if (!result) {
    el.innerHTML = `<div style="padding:48px 0;text-align:center;color:var(--muted);font-size:15px">
      Complete your first session<br>to see a recap here.</div>`;
    return;
  }

  const d  = new Date(result.date);
  const ds = d.toLocaleDateString('en-GB', {weekday:'long', day:'numeric', month:'long'}) +
             ', ' + d.toLocaleTimeString('en-GB', {hour:'2-digit', minute:'2-digit'});
  const totalMin = Math.round(result.duration / 60);
  const sug = getSuggestion(result, real);

  const intBars = [0, 1, 2].map(i => {
    const pct = Math.round((result.intervalZone[i] || 0) * 100);
    return `<div class="int-row">
      <div class="int-head"><span>Interval ${i+1}</span><span>${pct}% in zone</span></div>
      <div class="int-track"><div class="int-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');

  const sugHtml = sug ? `
    <div class="suggestion${sug.good ? ' good' : ''}">
      <div class="sug-lbl">${sug.good ? 'Progress' : 'Next session'}</div>
      <div class="sug-txt">${sug.text}</div>
    </div>` : '';

  // Only show real sessions in history list, excluding current
  const prevSessions = real.filter(s => s.id !== result.id).slice(-6).reverse();
  const histHtml = prevSessions.length ? `
    <p class="sec-lbl" style="margin-bottom:10px">Previous sessions</p>
    <div class="hist-section">
      ${prevSessions.map(s => {
        const dd = new Date(s.date);
        const dds = dd.toLocaleDateString('en-GB', {day:'numeric', month:'short'});
        const z   = Math.round(s.intervalZone.reduce((a,b)=>a+b,0) / 3 * 100);
        return `<div class="hist-item">
          <span class="hist-d">${dds}</span>
          <span class="hist-v">${s.peakHR} bpm · ${z}% in zone</span>
        </div>`;
      }).join('')}
    </div>` : '';

  const nextLvlHtml = `
    <p class="sec-lbl" style="margin-bottom:10px">Next session levels</p>
    <div style="display:flex; gap:10px; margin-bottom:24px;">
      ${state.levels.interval.map((l,i) => `
        <div style="flex:1; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;">
          <div style="font-size:22px; font-weight:600;">${l}</div>
          <div style="font-size:11px; color:var(--muted); margin-top:2px;">Interval ${i+1}</div>
        </div>`).join('')}
      <div style="flex:1; border:1px solid var(--border); border-radius:12px; padding:12px; text-align:center;">
        <div style="font-size:22px; font-weight:600;">${state.levels.recovery}</div>
        <div style="font-size:11px; color:var(--muted); margin-top:2px;">Recovery</div>
      </div>
    </div>`;

  el.innerHTML = `
    <div class="recap-hdr">
      <div class="recap-title">Session recap</div>
      <div class="recap-date">${ds}</div>
    </div>
    <div class="recap-pills">
      <div class="recap-pill">
        <div class="pill-val" style="color:var(--coral)">${result.peakHR || '—'}</div>
        <div class="pill-lbl">Peak HR (bpm)</div>
      </div>
      <div class="recap-pill">
        <div class="pill-val">${totalMin}</div>
        <div class="pill-lbl">Minutes</div>
      </div>
    </div>
    <p class="sec-lbl" style="margin-bottom:12px">Interval performance</p>
    <div class="int-bars">${intBars}</div>
    ${sugHtml}
    ${nextLvlHtml}
    ${histHtml}`;
}

// ═══════ EXPORT / IMPORT ═══════
function exportData() {
  const blob = new Blob([JSON.stringify(state.history, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url;
  a.download = `stair-sessions-${new Date().toISOString().split('T')[0]}.json`;
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function importData(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!Array.isArray(imported)) throw new Error();
      const existIds = new Set(state.history.map(s => s.id));
      const newOnes  = imported.filter(s => !existIds.has(s.id));
      state.history = [...state.history, ...newOnes]
        .sort((a, b) => a.date.localeCompare(b.date));
      saveHistory();
      renderRecap();
      alert(`Imported ${newOnes.length} session${newOnes.length !== 1 ? 's' : ''}. ` +
            `${imported.length - newOnes.length} already existed and were kept.`);
    } catch(e) {
      alert('Could not read file. Make sure it is a valid session export.');
    }
  };
  reader.readAsText(file);
}

// ═══════ EVENTS ═══════
document.querySelectorAll('.nav-btn').forEach(btn =>
  btn.addEventListener('click', () => goTo(btn.dataset.s)));

document.getElementById('btn-connect').addEventListener('click', connectBT);

document.getElementById('btn-start').addEventListener('click', () => {
  if (state.bt.connected && !state.sess?.running) startSession();
});

document.getElementById('btn-pr').addEventListener('click', () => {
  if (state.sess?.paused) resumeSession(); else pauseSession();
});

document.getElementById('btn-end').addEventListener('click', () => {
  if (confirm('End this session and go to recap?')) endSession();
});

document.getElementById('btn-export').addEventListener('click', exportData);

document.getElementById('btn-import').addEventListener('click', () =>
  document.getElementById('file-input').click());

document.getElementById('file-input').addEventListener('change', e => {
  if (e.target.files[0]) importData(e.target.files[0]);
  e.target.value = '';
});

// ═══════ INIT ═══════
loadHistory();
loadLevels();
renderSetup();
</script>
