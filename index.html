<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Figtree:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #EDF2F7;
      --card:    #FFFFFF;
      --text:    #2D3A4A;
      --muted:   #718096;
      --border:  rgba(45,58,74,0.09);
      --ff:      'Figtree', sans-serif;

      --c1: #4A8FA8;  /* tracker  — slate blue  */
      --c2: #5B7FA6;  /* pomodoro — steel blue  */
      --c3: #4A9E8A;  /* cardio   — soft teal   */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--ff);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 20px 40px;
      -webkit-font-smoothing: antialiased;
    }

    header {
      text-align: center;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 0.95rem;
      color: var(--muted);
      font-weight: 400;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 260px));
      justify-content: center;
      gap: 20px;
      width: 100%;
      max-width: 880px;
    }

    .card {
      background: var(--card);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 28px 24px 24px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 10px;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 28px rgba(45,58,74,0.10);
    }

    /* Subtle top accent line per card */
    .card::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      border-radius: 16px 16px 0 0;
    }
    .card-1::before { background: var(--c1); }
    .card-2::before { background: var(--c2); }
    .card-3::before { background: var(--c3); }

    .card-icon {
      font-size: 1.6rem;
      line-height: 1;
    }

    .card-title {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
    }

    .card-desc {
      font-size: 0.875rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .card-arrow {
      margin-top: auto;
      padding-top: 14px;
      font-size: 0.8rem;
      font-weight: 500;
      letter-spacing: 0.03em;
    }
    .card-1 .card-arrow { color: var(--c1); }
    .card-2 .card-arrow { color: var(--c2); }
    .card-3 .card-arrow { color: var(--c3); }

    footer {
      margin-top: 56px;
      font-size: 0.8rem;
      color: var(--muted);
      opacity: 0.7;
    }
  </style>
</head>
<body>

  <header>
    <h1>My Dashboard</h1>
    <p class="subtitle">Choose an app to get started</p>
  </header>

  <div class="grid">

    <a href="daily-tracker/" class="card card-1">
      <div class="card-icon">📅</div>
      <div class="card-title">Daily Tracker</div>
      <div class="card-desc">Track habits, tasks, and daily progress</div>
      <div class="card-arrow">Open →</div>
    </a>

    <a href="Pomodoro-timer/" class="card card-2">
      <div class="card-icon">⏰</div>
      <div class="card-title">Pomodoro Timer</div>
      <div class="card-desc">Track your working hours</div>
      <div class="card-arrow">Open →</div>
    </a>

    <a href="CardioSession/" class="card card-3">
      <div class="card-icon">🏃‍♀️</div>
      <div class="card-title">Cardio Session</div>
      <div class="card-desc">Improve my heart health on the stair master</div>
      <div class="card-arrow">Open →</div>
    </a>

    <!-- Add more cards like this:
    <a href="new-app/" class="card card-1">
      <div class="card-icon">🧠</div>
      <div class="card-title">New App</div>
      <div class="card-desc">Description of your app</div>
      <div class="card-arrow">Open →</div>
    </a>
    -->

  </div>

  <footer>Built with Vibes</footer>

</body>
</html>
