<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Apps</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #333;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background: white;
      padding: 40px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.2);
      text-align: center;
      max-width: 500px;
      width: 90%;
    }

    h1 {
      margin-bottom: 10px;
      font-size: 2rem;
    }

    p {
      margin-bottom: 30px;
      color: #666;
    }

    .app-list {
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    .app-link {
      text-decoration: none;
      padding: 15px;
      border-radius: 10px;
      background: #f5f5f5;
      color: #333;
      font-weight: bold;
      transition: all 0.2s ease;
    }

    .app-link:hover {
      background: #667eea;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(0,0,0,0.15);
    }

    footer {
      margin-top: 25px;
      font-size: 0.85rem;
      color: #999;
    }
  </style>

</head>

<body>
  <div class="container">
    <h1>My Projects</h1>
    <p>Select an app to get started</p>

```
<div class="app-list">
  <a class="app-link" href="daily-tracker/">📅 Daily Tracker</a>
  <a class="app-link" href="Pomodoro-timer/">🚀 Pomodoro timer</a>
</div>
    
<footer>
  Built with GitHub Pages
</footer>
```

  </div>
</body>
</html>
