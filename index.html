<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>My Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    }

    body {
      background: #f4f6fb;
      color: #333;
      padding: 40px 20px;
    }

    h1 {
      text-align: center;
      margin-bottom: 10px;
      font-size: 2.2rem;
    }

    .subtitle {
      text-align: center;
      margin-bottom: 40px;
      color: #666;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 16px;
      padding: 25px;
      text-decoration: none;
      color: inherit;
      box-shadow: 0 8px 20px rgba(0,0,0,0.08);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 15px 30px rgba(0,0,0,0.12);
    }

    .card-icon {
      font-size: 2rem;
      margin-bottom: 15px;
    }

    .card-title {
      font-size: 1.2rem;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .card-desc {
      font-size: 0.9rem;
      color: #777;
    }

    /* Accent strip */
    .card::before {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 5px;
      background: linear-gradient(90deg, #667eea, #764ba2);
    }

    footer {
      text-align: center;
      margin-top: 50px;
      font-size: 0.85rem;
      color: #999;
    }
  </style>

</head>

<body>

  <h1>My Dashboard</h1>
  <p class="subtitle">Choose an app to get started</p>

  <div class="grid">


<a href="daily-tracker/" class="card">
  <div class="card-icon">📅</div>
  <div class="card-title">Daily Tracker</div>
  <div class="card-desc">Track habits, tasks, and daily progress</div>
</a>

<a href="Pomodoro-timer/" class="card">
  <div class="card-icon">🚀</div>
  <div class="card-title">Pomodoro-timer</div>
  <div class="card-desc">Track your working hours</div>
</a>

<!-- Add more cards like this -->

<a href="new-app/" class="card">
  <div class="card-icon">🧠</div>
  <div class="card-title">New App</div>
  <div class="card-desc">Description of your app</div>
</a>
-->


  </div>

  <footer>
    Built with VibeCoding
  </footer>

</body>
</html>
