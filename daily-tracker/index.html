<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Flow · Activity Tracker</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Helvetica,Arial,sans-serif;background:#f7f5f2;color:#1e1d1b;min-height:100vh}
    .app{max-width:100%;margin:0 auto;padding:28px 8px 80px}
    .header{padding:0 8px 24px;border-bottom:2px solid #e8e2d9;margin-bottom:0}
    h1{font-size:28px;font-weight:700;color:#1e1d1b;margin-bottom:2px;letter-spacing:-0.5px}
    h1 span{color:#e8935a}
    .tagline{font-size:16px;color:#9b9488;margin-top:4px}
    .tabs-row{display:flex;align-items:center;gap:0;overflow-x:auto;scrollbar-width:none;padding:0 8px;background:#fff;border-bottom:1px solid #e8e2d9}
    .tabs-row::-webkit-scrollbar{display:none}
    .tab-btn{flex-shrink:0;font-family:Helvetica,Arial,sans-serif;font-size:16px;font-weight:400;padding:14px 20px;border:none;background:transparent;color:#9b9488;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-1px;white-space:nowrap;transition:color .15s,border-color .15s}
    .tab-btn.active{color:#1e1d1b;border-bottom-color:#e8935a;font-weight:600}
    .tab-btn:hover:not(.active){color:#1e1d1b}
    .add-tab-btn{flex-shrink:0;font-family:Helvetica,Arial,sans-serif;font-size:22px;font-weight:300;padding:4px 16px;border:none;background:transparent;color:#c8c2b8;cursor:pointer;margin-bottom:-1px;line-height:1}
    .add-tab-btn:hover{color:#e8935a}
    .manage-row{display:flex;justify-content:flex-end;margin:12px 8px 0}
    .manage-btn{font-family:Helvetica,Arial,sans-serif;font-size:16px;color:#9b9488;background:none;border:none;cursor:pointer;text-decoration:underline;text-underline-offset:3px;padding:4px 0}
    .manage-btn:hover{color:#e8935a}
    .panel{padding:16px 0}
    .grid-wrap{display:flex;width:100%;gap:0}
    .day-labels{display:flex;flex-direction:column;padding-top:28px;flex-shrink:0;width:26px;margin-right:4px}
    .day-label{display:flex;align-items:center;justify-content:flex-end;font-size:12px;color:#c4bdb3;line-height:1;flex:1}
    .months-area{display:grid;grid-template-columns:repeat(12,1fr);gap:2px;flex:1;min-width:0}
    .month-col{display:flex;flex-direction:column;min-width:0}
    .month-name{font-size:12px;font-weight:600;text-align:center;height:28px;line-height:28px;overflow:hidden;letter-spacing:0.04em}
    .month-col:nth-child(1) .month-name{color:#6b9fd4}
    .month-col:nth-child(2) .month-name{color:#7eb8d4}
    .month-col:nth-child(3) .month-name{color:#6dba8a}
    .month-col:nth-child(4) .month-name{color:#8dc86e}
    .month-col:nth-child(5) .month-name{color:#c8c44a}
    .month-col:nth-child(6) .month-name{color:#e8a030}
    .month-col:nth-child(7) .month-name{color:#e8935a}
    .month-col:nth-child(8) .month-name{color:#e07848}
    .month-col:nth-child(9) .month-name{color:#c4774a}
    .month-col:nth-child(10) .month-name{color:#c46b3a}
    .month-col:nth-child(11) .month-name{color:#8a7ec8}
    .month-col:nth-child(12) .month-name{color:#6b9fd4}
    .month-stars{display:flex;flex-direction:column;flex:1}
    .star-cell{display:flex;align-items:center;justify-content:center;cursor:pointer;color:#dedad4;line-height:1;transition:color .15s,transform .12s;user-select:none;-webkit-tap-highlight-color:transparent;flex:1;font-size:clamp(18px,2.2vw,32px)}
    .star-cell:hover:not(.empty):not(.future){color:#f0c060;transform:scale(1.2)}
    .star-cell.done{color:#f5c022}
    .star-cell.today{outline:2px solid #e8935a;border-radius:3px}
    .star-cell.empty{cursor:default;color:transparent;pointer-events:none;visibility:hidden}
    .star-cell.future{color:#edeae4;cursor:default;pointer-events:none}
    .plant-wrap{display:flex;align-items:flex-end;gap:20px;margin-top:18px;padding:20px 24px;background:#fff;border-radius:14px;border:1px solid #e8e2d9;min-height:110px;position:relative;overflow:hidden}
    .plant-svg-wrap{flex-shrink:0;display:flex;align-items:flex-end}
    .plant-info{flex:1}
    .plant-info .pct{font-size:26px;font-weight:700;color:#e8935a;display:block;line-height:1.1}
    .plant-info .days-count{font-size:16px;font-weight:600;color:#1e1d1b;display:block;margin-top:2px}
    .milestone-badge{display:inline-block;margin-top:8px;font-size:13px;font-weight:600;color:#4a8e3a;background:#eaf6e4;border-radius:20px;padding:4px 12px;animation:badgePop .5s cubic-bezier(.34,1.56,.64,1)}
    @keyframes badgePop{from{transform:scale(0.5);opacity:0}to{transform:scale(1);opacity:1}}
    .leaf-burst{position:absolute;top:12px;right:16px;font-size:28px;animation:leafFloat 1.2s ease forwards}
    @keyframes leafFloat{0%{transform:scale(0) rotate(-20deg);opacity:0}30%{transform:scale(1.3) rotate(10deg);opacity:1}70%{transform:scale(1) rotate(-5deg);opacity:1}100%{transform:scale(1) rotate(0deg) translateY(-6px);opacity:0.9}}
    .no-activity{text-align:center;padding:48px 0;color:#b4b2a9;font-size:16px}
    .modal-backdrop{display:none;position:fixed;inset:0;background:rgba(30,29,27,.45);z-index:200;align-items:center;justify-content:center}
    .modal-backdrop.open{display:flex}
    .modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:420px;box-shadow:0 12px 40px rgba(0,0,0,.16)}
    .modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
    .modal-header h2{font-size:20px;font-weight:600;color:#1e1d1b}
    .modal-close{background:none;border:none;font-size:20px;color:#b4b2a9;cursor:pointer;line-height:1;padding:0}
    .modal-close:hover{color:#1e1d1b}
    .modal-list{display:flex;flex-direction:column;gap:8px;margin-bottom:16px;max-height:240px;overflow-y:auto}
    .modal-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f7f5f2;border-radius:10px;font-size:16px;color:#1e1d1b}
    .rm-btn{background:none;border:none;color:#d3d1c7;font-size:22px;cursor:pointer;line-height:1;padding:0 4px;font-weight:300}
    .rm-btn:hover{color:#e24b4a}
    .add-row{display:flex;gap:8px}
    .add-row input{flex:1;font-family:Helvetica,Arial,sans-serif;font-size:16px;padding:10px 14px;border:1.5px solid #e0dbd2;border-radius:10px;outline:none;background:#fff;color:#1e1d1b}
    .add-row input:focus{border-color:#e8935a}
    .add-row button{font-family:Helvetica,Arial,sans-serif;font-size:16px;padding:10px 20px;background:#e8935a;color:#fff;border:none;border-radius:10px;cursor:pointer;font-weight:500}
    .add-row button:hover{background:#d4783f}
    .confirm-modal{background:#fff;border-radius:16px;padding:28px;width:92%;max-width:360px}
    .confirm-modal p{font-size:16px;color:#1e1d1b;margin-bottom:24px;line-height:1.6}
    .confirm-btns{display:flex;gap:10px;justify-content:flex-end}
    .confirm-btns button{font-family:Helvetica,Arial,sans-serif;font-size:16px;padding:10px 20px;border-radius:10px;border:none;cursor:pointer;font-weight:500}
    .btn-cancel{background:#f0ede8;color:#5f5e5a}
    .btn-cancel:hover{background:#e2ddd6}
    .btn-delete{background:#e24b4a;color:#fff}
    .btn-delete:hover{background:#c23c3b}
  </style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>Daily <span>Flow</span></h1>
    <p class="tagline">Track your habits across the year — click a star to mark the day.</p>
  </div>
  <div class="tabs-row" id="tabsRow"></div>
  <div class="manage-row">
    <button class="manage-btn" onclick="openManage()">Manage activities</button>
  </div>
  <div id="panelArea"></div>
</div>

<div class="modal-backdrop" id="manageModal">
  <div class="modal">
    <div class="modal-header">
      <h2>Activities</h2>
      <button class="modal-close" onclick="closeManage()">✕</button>
    </div>
    <div class="modal-list" id="manageList"></div>
    <div class="add-row">
      <input id="newActInput" placeholder="New activity name…" maxlength="40" />
      <button onclick="addActivity()">Add</button>
    </div>
  </div>
</div>

<div class="modal-backdrop" id="confirmModal">
  <div class="confirm-modal">
    <p id="confirmText"></p>
    <div class="confirm-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-delete" onclick="doDelete()">Remove</button>
    </div>
  </div>
</div>

<script>
const STORE='dailyflow2';
const YEAR=new Date().getFullYear();
const TODAY=new Date();TODAY.setHours(0,0,0,0);
const MONTHS=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
const MAX_ROWS=31;

const MILESTONES=[
  {at:15,  badge:'🌿 First leaf!',      burst:'🍃'},
  {at:30,  badge:'🌱 Two leaves!',       burst:'🌿'},
  {at:50,  badge:'🌳 Growing strong!',   burst:'🍀'},
  {at:75,  badge:'🌸 First bud!',        burst:'🌺'},
  {at:100, badge:'🌻 In full bloom!',    burst:'🌻'},
  {at:150, badge:'🍂 Branching out!',    burst:'🌲'},
  {at:200, badge:'🏆 Unstoppable!',      burst:'✨'},
  {at:250, badge:'🌟 Legendary!',        burst:'🌟'},
  {at:300, badge:'💫 Year champion!',    burst:'🎊'},
  {at:365, badge:'🎉 Full year done!',   burst:'🎆'},
];

function fmt(d){return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
const todayKey=fmt(TODAY);
function load(){try{return JSON.parse(localStorage.getItem(STORE))||{}}catch(e){return{}}}
function save(d){try{localStorage.setItem(STORE,JSON.stringify(d))}catch(e){}}
let state=load();
if(!state.activities){state.activities=['Morning workout','Drink water','Read 20 min','Meditate','Journaling'];save(state);}
if(!state.records)state.records={};
let activeTab=0,pendingDelete=null;

function getMilestone(done){let best=null;for(const m of MILESTONES)if(done>=m.at)best=m;return best;}
function getNextMilestone(done){for(const m of MILESTONES)if(done<m.at)return m;return null;}
function leafCount(done){return Math.min(6,Math.floor(done/15));}

function plantSVG(done){
  const h=90,w=110;
  const leaves=leafCount(done);
  let svg=`<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg" style="overflow:visible">`;
  svg+=`<ellipse cx="55" cy="${h-4}" rx="30" ry="7" fill="#c4a882" opacity="0.45"/>`;
  if(done===0){
    svg+=`<ellipse cx="55" cy="${h-12}" rx="6" ry="5" fill="#8B6914"/>`;
  } else {
    const stemH=Math.min(10+leaves*11,76);
    const stemX=55,stemBase=h-10,stemTop=stemBase-stemH;
    svg+=`<line x1="${stemX}" y1="${stemBase}" x2="${stemX}" y2="${stemTop}" stroke="#4a8e3a" stroke-width="${2+Math.min(leaves,4)*0.5}" stroke-linecap="round"/>`;
    const pairs=Math.min(3,Math.floor(leaves/2));
    const singleTop=leaves%2===1;
    for(let p=0;p<pairs;p++){
      const frac=(p+0.5)/(Math.max(pairs,1)+0.5);
      const lx=stemX,ly=stemBase-stemH*frac*(0.4+p*0.2);
      const ls=9+p*1.5;
      svg+=`<ellipse cx="${lx-ls-2}" cy="${ly-4}" rx="${ls}" ry="${4+p}" fill="${p===0?'#6dba5a':p===1?'#82cc6a':'#5aaa4a'}" transform="rotate(-30,${lx-ls-2},${ly-4})"/>`;
      svg+=`<line x1="${lx}" y1="${ly}" x2="${lx-ls*1.4}" y2="${ly-6}" stroke="#3a7e2a" stroke-width="1" opacity="0.5"/>`;
      svg+=`<ellipse cx="${lx+ls+2}" cy="${ly-4}" rx="${ls}" ry="${4+p}" fill="${p===0?'#82cc6a':p===1?'#6dba5a':'#8acc70'}" transform="rotate(30,${lx+ls+2},${ly-4})"/>`;
      svg+=`<line x1="${lx}" y1="${ly}" x2="${lx+ls*1.4}" y2="${ly-6}" stroke="#3a7e2a" stroke-width="1" opacity="0.5"/>`;
    }
    if(singleTop&&leaves>0){svg+=`<ellipse cx="${stemX}" cy="${stemTop-6}" rx="7" ry="10" fill="#6dba5a"/>`;}
    if(leaves>=5){
      const bx=stemX,by=stemTop-2;
      const petals=[[0,-10],[7,-7],[10,0],[7,7],[0,10],[-7,7],[-10,0],[-7,-7]];
      petals.forEach(([dx,dy])=>{svg+=`<ellipse cx="${bx+dx}" cy="${by+dy}" rx="5" ry="3.5" fill="#f8b4c8" transform="rotate(${Math.atan2(dy,dx)*180/Math.PI},${bx+dx},${by+dy})"/>`;});
      svg+=`<circle cx="${bx}" cy="${by}" r="6" fill="#f5c022"/>`;
      svg+=`<circle cx="${bx}" cy="${by}" r="3.5" fill="#e8a030"/>`;
    } else if(leaves>=4){
      const bx=stemX,by=stemTop-2;
      svg+=`<ellipse cx="${bx}" cy="${by}" rx="6" ry="8" fill="#f4a0b0"/>`;
      svg+=`<ellipse cx="${bx}" cy="${by+2}" rx="4" ry="5" fill="#f07090"/>`;
    } else if(!singleTop){
      svg+=`<ellipse cx="${stemX}" cy="${stemTop-3}" rx="4" ry="6" fill="#4a8e3a"/>`;
    }
  }
  svg+='</svg>';
  return svg;
}

function plantInfo(done,total){
  const pct=total?Math.round(done/total*100):0;
  const milestone=getMilestone(done);
  const next=getNextMilestone(done);
  const toNext=next?next.at-done:0;
  let badgeHtml=milestone?`<span class="milestone-badge">${milestone.badge}</span>`:'';
  let nextHtml=next?`<span style="font-size:14px;color:#b4b2a9;display:block;margin-top:6px">${toNext} more for next milestone</span>`:'';
  return`<div class="plant-info"><span class="pct">${pct}%</span><span class="days-count">${done} / ${total} days</span>${badgeHtml}${nextHtml}</div>`;
}

function buildGrid(actName){
  const recs=state.records[actName]||{};
  let totalDays=0,doneDays=0;
  let dayLabels='<div class="day-labels">';
  for(let d=1;d<=MAX_ROWS;d++) dayLabels+=`<div class="day-label">${d}</div>`;
  dayLabels+='</div>';
  let monthsHtml='<div class="months-area">';
  for(let m=0;m<12;m++){
    const daysInMonth=new Date(YEAR,m+1,0).getDate();
    monthsHtml+=`<div class="month-col"><div class="month-name">${MONTHS[m]}</div><div class="month-stars">`;
    for(let d=1;d<=MAX_ROWS;d++){
      if(d>daysInMonth){
        monthsHtml+=`<div class="star-cell empty">★</div>`;
      } else {
        const dateObj=new Date(YEAR,m,d);
        const k=fmt(dateObj);
        const dm=new Date(dateObj);dm.setHours(0,0,0,0);
        const isToday=k===todayKey,isFuture=dm>TODAY,isDone=!!recs[k];
        totalDays++;if(isDone)doneDays++;
        const cls=['star-cell',isDone?'done':'',isToday?'today':'',isFuture?'future':''].filter(Boolean).join(' ');
        const title=dateObj.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'});
        const handler=!isFuture?`onclick="toggleDay('${actName}','${k}',this)"`:'';
        monthsHtml+=`<div class="${cls}" title="${title}" ${handler}>★</div>`;
      }
    }
    monthsHtml+=`</div></div>`;
  }
  monthsHtml+='</div>';
  return`<div class="grid-wrap">${dayLabels}${monthsHtml}</div>
  <div class="plant-wrap" id="plantWrap">
    <div class="plant-svg-wrap" id="plantSvg">${plantSVG(doneDays)}</div>
    ${plantInfo(doneDays,totalDays)}
  </div>`;
}

function renderTabs(){
  const row=document.getElementById('tabsRow');row.innerHTML='';
  state.activities.forEach((a,i)=>{const btn=document.createElement('button');btn.className='tab-btn'+(i===activeTab?' active':'');btn.textContent=a;btn.onclick=()=>{activeTab=i;renderTabs();renderPanel()};row.appendChild(btn);});
  const addBtn=document.createElement('button');addBtn.className='add-tab-btn';addBtn.title='Add activity';addBtn.textContent='+';addBtn.onclick=openManage;row.appendChild(addBtn);
}
function renderPanel(){
  const panel=document.getElementById('panelArea');
  if(!state.activities.length){panel.innerHTML='<div class="no-activity">No activities yet.</div>';return;}
  if(activeTab>=state.activities.length)activeTab=Math.max(0,state.activities.length-1);
  panel.innerHTML=`<div class="panel">${buildGrid(state.activities[activeTab])}</div>`;
}

function toggleDay(actName,dateKey,el){
  if(!state.records[actName])state.records[actName]={};
  const cur=!!state.records[actName][dateKey];
  if(cur) delete state.records[actName][dateKey];
  else state.records[actName][dateKey]=true;
  save(state);
  el.classList.toggle('done',!cur);
  const recs=state.records[actName];
  let done=0,total=0;
  for(let m=0;m<12;m++){const dim=new Date(YEAR,m+1,0).getDate();total+=dim;for(let d=1;d<=dim;d++){const k=fmt(new Date(YEAR,m,d));if(recs[k])done++;}}
  const crossedMilestone=!cur&&MILESTONES.find(ms=>ms.at===done);
  const wrap=document.getElementById('plantWrap');
  if(wrap){
    wrap.innerHTML=`<div class="plant-svg-wrap" id="plantSvg">${plantSVG(done)}</div>${plantInfo(done,total)}`;
    if(crossedMilestone){
      const burst=document.createElement('div');
      burst.className='leaf-burst';
      burst.textContent=crossedMilestone.burst;
      wrap.appendChild(burst);
      setTimeout(()=>burst.remove(),1400);
    }
  }
}

function openManage(){renderManageList();document.getElementById('manageModal').classList.add('open');setTimeout(()=>document.getElementById('newActInput').focus(),50);}
function closeManage(){document.getElementById('manageModal').classList.remove('open');renderTabs();renderPanel();}
function renderManageList(){
  const list=document.getElementById('manageList');
  if(!state.activities.length){list.innerHTML='<div style="font-size:16px;color:#b4b2a9;text-align:center;padding:10px">No activities yet.</div>';return;}
  list.innerHTML=state.activities.map((a,i)=>`<div class="modal-item"><span>${a.replace(/&/g,'&amp;').replace(/</g,'&lt;')}</span><button class="rm-btn" onclick="confirmDelete(${i})" title="Remove">×</button></div>`).join('');
}
function addActivity(){const inp=document.getElementById('newActInput');const name=inp.value.trim();if(!name)return;if(state.activities.includes(name)){inp.select();return;}state.activities.push(name);save(state);inp.value='';renderManageList();}
document.getElementById('newActInput').addEventListener('keydown',e=>{if(e.key==='Enter')addActivity();});
function confirmDelete(idx){pendingDelete=idx;document.getElementById('confirmText').textContent=`Remove "${state.activities[idx]}" and all its recorded data? This cannot be undone.`;document.getElementById('confirmModal').classList.add('open');}
function closeConfirm(){document.getElementById('confirmModal').classList.remove('open');pendingDelete=null;}
function doDelete(){if(pendingDelete===null)return;const name=state.activities[pendingDelete];state.activities.splice(pendingDelete,1);delete state.records[name];if(activeTab>=state.activities.length)activeTab=Math.max(0,state.activities.length-1);save(state);closeConfirm();renderManageList();renderTabs();renderPanel();}
document.getElementById('manageModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeManage();});
document.getElementById('confirmModal').addEventListener('click',e=>{if(e.target===e.currentTarget)closeConfirm();});
renderTabs();renderPanel();
</script>
</body>
</html>
